services:
  # Qdrant — add networking, healthcheck, and collection init
  mem0_store:
    networks:
      - openmemory_network
    healthcheck:
      test: ["CMD-SHELL", "command -v curl >/dev/null && curl -f http://localhost:6333/collections || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - ./init-qdrant.sh:/docker-entrypoint-initdb.d/init-qdrant.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Installing curl..."
        apt-get update && apt-get install -y curl

        echo "Starting Qdrant in background..."
        /qdrant/qdrant &
        QDRANT_PID=$!

        echo "Waiting for Qdrant to initialize..."
        sleep 5

        echo "Running collection init script..."
        sh /docker-entrypoint-initdb.d/init-qdrant.sh

        echo "Qdrant ready."
        wait $QDRANT_PID

  # Neo4j — graph database for entity relationships
  neo4j:
    image: neo4j:5.26.4
    ports:
      - "8474:7474"  # HTTP
      - "8687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/openmemory
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - openmemory_network

  # OpenMemory API — add Neo4j dependency, networking, host access
  openmemory-mcp:
    depends_on:
      neo4j:
        condition: service_healthy
      mem0_store:
        condition: service_healthy
    networks:
      - openmemory_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload"

  # OpenMemory UI — fix API URL and add dependencies
  openmemory-ui:
    build:
      context: ui/
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8765
        - NEXT_PUBLIC_USER_ID=steven
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8765
      - NEXT_PUBLIC_USER_ID=steven
    depends_on:
      - openmemory-mcp
    networks:
      - openmemory_network

volumes:
  neo4j_data:

networks:
  openmemory_network:
    driver: bridge
